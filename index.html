<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>デジタルアーツ同好会 - 公式ホームページ（移転しました）</title>
    <meta name="description" content="デジタルアーツ同好会の公式サイトは移転いたしました。新しいURLはこちらです：https://trails-packed-router-moisture.trycloudflare.com/">
    
    <link rel="canonical" href="https://trails-packed-router-moisture.trycloudflare.com/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #333;
            --accent-color: #007bff;
            --move-btn-color: #e63946;
            --bg-color: #f4f4f4;
            --white: #ffffff;
            --text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            --transition: 0.3s ease;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--primary-color);
            line-height: 1.8;
            background-color: var(--bg-color);
            word-break: break-all;
        }

        /* フェードインの設定：JSが動かない場合も考慮して、少し透明度を残すか、クラスが追加されたら表示 */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease-out, transform 1s ease-out;
            visibility: hidden; /* 表示されない問題を回避するため、JSで制御 */
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--white);
            text-align: center;
            /* 画像パスを新しいサーバーの絶対パスに変更 */
            background-image: url('https://trails-packed-router-moisture.trycloudflare.com/Sample.png'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); 
        }

        .hero-content {
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .hero-title {
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 700;
            margin: 0 0 20px 0;
            text-shadow: var(--text-shadow);
            line-height: 1.2;
        }

        .btn-move-site {
            display: inline-block;
            background-color: var(--move-btn-color);
            color: var(--white);
            padding: 18px clamp(30px, 8vw, 60px);
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: var(--transition);
            margin-top: 20px;
            border: 2px solid var(--white);
        }

        .btn-move-site:hover {
            transform: scale(1.05);
            background-color: #ff4d5a;
        }

        section {
            padding: 80px 20px;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary-color);
            display: inline-block;
            padding-bottom: 5px;
        }

        .content-box {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: left;
            margin-bottom: 30px;
        }

        .member-list {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 15px; list-style: none; padding: 0;
        }

        .member-item {
            background: var(--white); border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .member-item a {
            display: block; padding: 12px 25px;
            color: var(--primary-color); text-decoration: none; font-weight: bold;
        }

        footer {
            background: var(--primary-color); color: var(--white);
            padding: 30px 20px; text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <h1 class="hero-title">移転のお知らせ</h1>
            <p>デジタルアーツ同好会の公式サイトは移転しました。<br>新しいURLは以下の通りです。</p>
            <a href="https://trails-packed-router-moisture.trycloudflare.com/" class="btn-move-site">
                新サイトへ移動する
            </a>
        </div>
    </header>

    <section id="about" class="fade-in">
        <h2>About</h2>
        <div class="content-box">
            <p style="text-align: center; font-weight: bold; font-size: 1.2rem;">
                デジタルアーツ同好会
            </p>
            <p>
                イラスト、作曲、演奏、3Dアートなど、多岐にわたるクリエイティブな活動を行っています。
                現在、最新の情報や活動記録は新ホームページにて公開中です。
            </p>
        </div>
    </section>

    <section id="members" class="fade-in">
        <h2>Members</h2>
        <ul class="member-list">
            <li class="member-item"><a href="oishi/oishi.html">Serenium</a></li>
            <li class="member-item"><a href="https://serenium34.github.io/DAServer/nakao/nakao.html">ミカド</a></li>
            <li class="member-item"><a href="https://serenium34.github.io/DAServer/hasebe/hasebe.html">Hassky</a></li>
            <li class="member-item"><a href="https://serenium34.github.io/DAServer/okumura/okumura.html">Colosuke(仮)</a></li>
            <li class="member-item"><a href="hasebe/hasebe.html">長谷部 凜</a></li>
        </ul>
    </section>

    <footer>
        <p>&copy; デジタルアーツ同好会</p>
    </footer>

    <script>
        // フェードイン表示の制御
        const showElements = () => {
            const elements = document.querySelectorAll('.fade-in');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            elements.forEach(el => {
                observer.observe(el);
                // 万が一表示されない時のためのバックアップ：少しでもスクロールされたら強制表示
                if (el.getBoundingClientRect().top < window.innerHeight) {
                    el.classList.add('visible');
                }
            });
        };

        // DOMの読み込み完了時に実行
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', showElements);
        } else {
            showElements();
        }
    </script>

</body>
</html>
