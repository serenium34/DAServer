<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>デジタルアーツ同好会 - 公式ホームページ（移転のお知らせ）</title>
    <meta name="description" content="デジタルアーツ同好会の公式サイトは移転いたしました。新しいURLはこちらです：https://trails-packed-router-moisture.trycloudflare.com/">
    
    <link rel="canonical" href="https://trails-packed-router-moisture.trycloudflare.com/">

    <meta http-equiv="refresh" content="10;url=https://trails-packed-router-moisture.trycloudflare.com/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #333;
            --accent-color: #007bff;
            --move-btn-color: #e63946; /* 移転ボタン用の目立つ色 */
            --bg-color: #f4f4f4;
            --white: #ffffff;
            --text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            --transition: 0.3s ease;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--primary-color);
            line-height: 1.8;
            background-color: var(--bg-color);
            word-break: break-all;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ヒーローセクションを移転案内に特化 */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--white);
            text-align: center;
            background-image: url('Sample.png'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); 
        }

        .hero-content {
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 800px;
        }

        .hero-title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            margin: 0 0 20px 0;
            text-shadow: var(--text-shadow);
        }

        /* 新しいサイトへのボタン */
        .btn-move-site {
            display: inline-block;
            background-color: var(--move-btn-color);
            color: var(--white);
            padding: 20px clamp(40px, 10vw, 80px);
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: var(--transition);
            margin-top: 20px;
            border: 3px solid var(--white);
        }

        .btn-move-site:hover {
            transform: scale(1.05);
            background-color: #ff4d5a;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .move-notice-text {
            font-size: 1.1rem;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 5px;
        }

        section {
            padding: clamp(60px, 10vw, 100px) 20px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        h2 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 40px;
            border-bottom: 3px solid var(--primary-color);
            display: inline-block;
            padding-bottom: 10px;
        }

        .club-name h1 { font-size: 1.8rem; margin-bottom: 0; }
        .club-name h3 { font-size: 1.1rem; color: #666; margin-top: 0.5rem; }

        .recruit-info, .advisor-card, .gallery-container {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        .member-list {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 15px; list-style: none; padding: 0;
        }

        .member-item {
            background: var(--white); border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: var(--transition);
        }

        .member-item a {
            display: block; padding: 12px 25px;
            color: var(--primary-color); text-decoration: none; font-weight: bold;
        }

        .member-item:hover { transform: translateY(-5px); box-shadow: 0 6px 15px rgba(0,123,255,0.2); }

        footer {
            background: var(--primary-color); color: var(--white);
            padding: 40px 20px; text-align: center;
        }

        /* 下部の案内ポップアップを少し控えめに修正 */
        .redirect-notice {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            z-index: 100;
            font-size: 0.85rem;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <div class="move-notice-text">SITE RELOCATION</div>
            <h1 class="hero-title">公式サイトは<br>移転しました</h1>
            <p>デジタルアーツ同好会の新しいホームページは<br>下記のボタンからアクセスいただけます。</p>
            
            <a href="https://trails-packed-router-moisture.trycloudflare.com/" class="btn-move-site">
                最新サイトを表示する
            </a>
        </div>
    </header>

    <section id="about" class="fade-in">
        <h2>About</h2>
        <div class="club-name">
            <h1>デジタルアーツ同好会</h1>
            <h3>Digital Arts Club</h3>
        </div>
        <p>
            イラスト，作曲，演奏，撮影，3Dアートなど<br>
            クリエイティブな活動の新しい拠点は新サイトへ移行しました。
        </p>
    </section>

    <section id="members" class="fade-in">
        <h2>Members</h2>
        <ul class="member-list">
            <li class="member-item"><a href="oishi/oishi.html">Serenium</a></li>
            <li class="member-item"><a href="https://serenium34.github.io/DAServer/nakao/nakao.html">ミカド</a></li>
            <li class="member-item"><a href="https://serenium34.github.io/DAServer/hasebe/hasebe.html">Hassky</a></li>
            <li class="member-item"><a href="https://serenium34.github.io/DAServer/okumura/okumura.html">Colosuke(仮)</a></li>
            <li class="member-item"><a href="hasebe/hasebe.html">長谷部 凜</a></li>
        </ul>
    </section>

    <footer>
        <p>&copy; デジタルアーツ同好会 - 新サイトにて活動継続中</p>
    </footer>

    <script>
        // フェードインアニメーション用
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

</body>
</html>
